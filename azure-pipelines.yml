# Docker
- task: NodeTaskRunnerInstaller@0
  inputs:
    nodeVersion: '6'
- task: Docker@2
  inputs:
    containerRegistry: 'devopsacrproject'
    repository: 'devopsacrproject'
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: '4740aae3-37b8-44fe-b6a0-4ddb876baa95'
  imageRepository: 'sanjaydahiyaazuredevopsclass'
  containerRegistry: 'devopsacrproject.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile.txt'
  tag: '$(Build.BuildId)'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
